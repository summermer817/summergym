    window.DB = {
      // ─── Workout Logs ───
      async getLogs() {
        const snap = await db.collection("gym_logs").orderBy("date", "desc").get();
        return snap.docs.map(d => ({ _id: d.id, ...d.data() }));
      },
      async addLog(log) {
        const ref = await db.collection("gym_logs").add(log);
        return { _id: ref.id, ...log };
      },
      async updateLog(id, log) {
        await db.collection("gym_logs").doc(id).set(log, { merge: true });
      },
      async deleteLog(id) {
        await db.collection("gym_logs").doc(id).delete();
      },
      // ─── Custom Settings ───
      async getCustom() {
        const doc = await db.collection("gym_settings").doc("custom").get();
        return doc.exists ? doc.data() : null;
      },
      async saveCustom(data) {
        await db.collection("gym_settings").doc("custom").set(data);
      }
    };

    // ─── UTC+8 Taiwan time helpers ───
    function todayStr() {
      // Always returns YYYY-MM-DD in Asia/Taipei timezone
      const parts = new Intl.DateTimeFormat("zh-TW", { timeZone: "Asia/Taipei", year: "numeric", month: "2-digit", day: "2-digit" }).formatToParts(new Date());
      const y = parts.find(p => p.type === "year").value;
      const m = parts.find(p => p.type === "month").value;
      const d = parts.find(p => p.type === "day").value;
      return `${y}-${m}-${d}`;
    }
    function nowTimeStr() {
      const parts = new Intl.DateTimeFormat("zh-TW", { timeZone: "Asia/Taipei", hour: "2-digit", minute: "2-digit", hour12: false }).formatToParts(new Date());
      const h = parts.find(p => p.type === "hour").value;
      const m = parts.find(p => p.type === "minute").value;
      return `${h}:${m}`;
    }
    // Monday-based week: get Monday of current week in Asia/Taipei
    function weekMondayStr() {
      const t = todayStr();
      const d = new Date(t + "T00:00:00+08:00");
      const day = d.getDay(); // 0=Sun
      const diff = day === 0 ? 6 : day - 1;
      d.setDate(d.getDate() - diff);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }

    // ─── Exercise Card (with check toggle) ───
    function ExerciseCard({ exercise, data, onUpdate, groupColor, checked, onToggle }) {
      const [unit, setUnit] = useState(data?.unit || "kg");
      const sets = data?.sets || [];
      const updateSets = (s) => onUpdate({ ...data, sets: s, unit });
      const addSet = () => {
        const last = sets[sets.length - 1];
        updateSets([...sets, { weight: last?.weight || "", reps: last?.reps || "" }]);
      };
      useEffect(() => { if (data && data.unit !== unit) onUpdate({ ...data, unit }); }, [unit]);

      const vol = sets.reduce((s, set) => {
        const w = parseFloat(set.weight) || 0;
        const r = parseInt(set.reps) || 0;
        return s + (unit === "lb" ? w * 0.453592 : w) * r;
      }, 0);

      return (
        <div style={{
          background: checked ? `${groupColor}06` : T.bg,
          borderRadius: T.radiusSm, padding: "10px 12px",
          border: `1.5px solid ${checked ? groupColor + "30" : T.sep}`,
          transition: "all 0.25s",
          opacity: checked ? 1 : 0.6,
        }}>
          {/* Header row with checkbox */}
          <div onClick={onToggle} style={{
            display: "flex", alignItems: "center", gap: 10, cursor: "pointer",
            marginBottom: checked && sets.length > 0 ? 10 : 0,
          }}>
            <div style={{
              width: 24, height: 24, borderRadius: 12, flexShrink: 0,
              border: checked ? "none" : `2px solid ${T.text4}`,
              background: checked ? groupColor : "transparent",
              display: "flex", alignItems: "center", justifyContent: "center",
              transition: "all 0.2s",
            }}>
              {checked && <span style={{ color: "#fff", fontSize: 14, lineHeight: 1 }}>✓</span>}
            </div>
            <span style={{
              width: 28, height: 28, borderRadius: 7, display: "flex",
              alignItems: "center", justifyContent: "center", fontSize: 14,
              background: `${groupColor}12`,
            }}>{exercise.icon}</span>
            <span style={{
              fontSize: 14, fontWeight: 500, flex: 1,
              color: checked ? T.text : T.text4,
              textDecoration: checked ? "none" : "none",
            }}>{exercise.name}</span>
            {checked && vol > 0 && <span style={{ fontSize: 11, color: T.text3, fontWeight: 500 }}>{vol.toFixed(0)}kg</span>}
            {checked && (
              <button onClick={(e) => { e.stopPropagation(); setUnit(u => u === "kg" ? "lb" : "kg"); }} style={{
                padding: "2px 7px", borderRadius: 5, fontSize: 10, fontWeight: 700,
                border: `1.5px solid ${groupColor}40`, background: "transparent",
                color: groupColor, cursor: "pointer", fontFamily: T.font,
              }}>{unit.toUpperCase()}</button>
            )}
          </div>

          {/* Sets (only when checked) */}
          {checked && (
            <div style={{ paddingLeft: 34 }}>
              {sets.map((set, i) => (
                <div key={i} style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 5 }}>
                  <span style={{
                    width: 20, height: 20, borderRadius: 10, background: `${groupColor}15`,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 10, fontWeight: 700, color: groupColor, flexShrink: 0,
                  }}>{i + 1}</span>
                  <input type="number" placeholder="重量" value={set.weight || ""}
                    onChange={e => { const n = [...sets]; n[i] = { ...set, weight: e.target.value }; updateSets(n); }}
                    style={{
                      width: 60, padding: "5px 7px", borderRadius: 7, textAlign: "center",
                      border: `1.5px solid ${T.sep}`, background: T.white, color: T.text,
                      fontSize: 13, fontFamily: T.font, outline: "none",
                    }} />
                  <span style={{ fontSize: 11, color: T.text4 }}>{unit}</span>
                  <span style={{ color: T.text4, fontSize: 12 }}>×</span>
                  <input type="number" placeholder="次" value={set.reps || ""}
                    onChange={e => { const n = [...sets]; n[i] = { ...set, reps: e.target.value }; updateSets(n); }}
                    style={{
                      width: 48, padding: "5px 7px", borderRadius: 7, textAlign: "center",

                      fontSize: 13, fontFamily: T.font, outline: "none",
                    }} />
                  <span style={{ fontSize: 11, color: T.text4 }}>下</span>
                  {set.weight && (
                    <span style={{ fontSize: 9, color: T.text4, marginLeft: "auto" }}>
                      ≈{unit === "lb" ? `${lbToKg(set.weight)}kg` : `${kgToLb(set.weight)}lb`}
                    </span>
                  )}
                  <button onClick={() => updateSets(sets.filter((_, j) => j !== i))} style={{
                    width: 18, height: 18, borderRadius: 9, border: "none",
                    background: `${T.pink}12`, color: T.pink, fontSize: 10,
                    cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",

    // ─── Checkable Exercise List ───
    function CheckableExerciseList({ exercises, exerciseData, checkedExercises, groupColor, onUpdateExercise, onToggle, onToggleAll, onAddExercise }) {
      const [showAdd, setShowAdd] = useState(false);
      const [newName, setNewName] = useState("");
      const [newIcon, setNewIcon] = useState("🔹");

      const doAdd = () => {
        if (!newName.trim()) return;
        if (exercises.some(e => e.name === newName.trim())) { alert("此動作已存在！"); return; }
        onAddExercise({ name: newName.trim(), icon: newIcon || "🔹", _custom: true });
        setNewName(""); setNewIcon("🔹"); setShowAdd(false);
      };

      const checkedCount = exercises.filter(ex => checkedExercises[ex.name]).length;

      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <span style={{ fontSize: 12, color: T.text3 }}>

            </span>

                padding: "4px 10px", borderRadius: 8, fontSize: 11, fontWeight: 600,
                border: `1.5px solid ${T.sep}`, background: T.white,
                color: T.text3, cursor: "pointer", fontFamily: T.font,
              }}>{checkedCount === exercises.length ? "全不選" : "全選"}</button>
              <button onClick={() => setShowAdd(!showAdd)} style={{
                padding: "4px 10px", borderRadius: 8, fontSize: 11, fontWeight: 600,
                border: `1.5px solid ${showAdd ? groupColor : T.sep}`,
                background: showAdd ? `${groupColor}12` : T.white,
                color: showAdd ? groupColor : T.text3, cursor: "pointer", fontFamily: T.font,
              }}>{showAdd ? "✕ 取消" : "+ 新增動作"}</button>
            </div>
          </div>
          {showAdd && (
            <div style={{ background: T.white, borderRadius: T.radiusSm, padding: 14, marginBottom: 10, border: `2px dashed ${groupColor}40` }}>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <input value={newIcon} onChange={e => setNewIcon(e.target.value)} style={{
                  width: 42, height: 42, borderRadius: 10, border: `1.5px solid ${T.sep}`,
                  background: `${groupColor}10`, textAlign: "center", fontSize: 18, outline: "none", fontFamily: T.font,
                }} />
                <input placeholder="輸入動作名稱" value={newName} onChange={e => setNewName(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && doAdd()}
                  style={{ flex: 1, padding: "10px 14px", borderRadius: 10, border: `1.5px solid ${T.sep}`, background: T.white, color: T.text, fontSize: 14, fontFamily: T.font, outline: "none" }} />
                <button onClick={doAdd} style={{
                  padding: "10px 14px", borderRadius: 10, border: "none", background: groupColor,
                  color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: T.font,
                  whiteSpace: "nowrap", boxShadow: `0 2px 8px ${groupColor}40`,
                }}>加入</button>
              </div>
              <div style={{ fontSize: 11, color: T.text4, marginTop: 6, paddingLeft: 50 }}>左邊可自訂 emoji 圖示</div>
            </div>
          )}
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {exercises.map(ex => (
              <ExerciseCard key={ex.name} exercise={ex} data={exerciseData[ex.name]}
                groupColor={groupColor} checked={!!checkedExercises[ex.name]}
                onToggle={() => onToggle(ex.name)}
                onUpdate={d => onUpdateExercise(ex.name, d)} />
            ))}
          </div>
        </div>
      );
    }

    // ─── Calendar ───
    function CalendarView({ logs, onSelectDate, selectedDate, allMuscleGroups }) {
      const [viewDate, setViewDate] = useState(new Date());
      const [hasJumped, setHasJumped] = useState(false);

      // Auto-jump to month of most recent log when data first loads
      useEffect(() => {
        if (!hasJumped && logs.length > 0 && logs[0].date) {
          const parts = String(logs[0].date).split("-");
          if (parts.length === 3) {
            setViewDate(new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, 1));
            setHasJumped(true);
          }
        }
      }, [logs, hasJumped]);
      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const firstDayMon = firstDay === 0 ? 6 : firstDay - 1; // Monday=0, Sunday=6
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const prevDays = new Date(year, month, 0).getDate();

      const logsByDate = useMemo(() => {
        const m = {};
        logs.forEach(l => { if (!m[l.date]) m[l.date] = []; m[l.date].push(l); });
        return m;
      }, [logs]);

      const todayDate = todayStr();
      const cells = [];
      for (let i = firstDayMon - 1; i >= 0; i--) cells.push({ day: prevDays - i, outside: true });
      for (let d = 1; d <= daysInMonth; d++) {
        const ds = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
        cells.push({ day: d, dateStr: ds, logs: logsByDate[ds] || [], today: ds === todayDate });
      }
      const rem = 7 - (cells.length % 7);
      if (rem < 7) for (let i = 1; i <= rem; i++) cells.push({ day: i, outside: true });

      return (
        <Card style={{ padding: "16px 12px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, padding: "0 4px" }}>
            <button onClick={() => setViewDate(new Date(year, month - 1, 1))} style={{
              width: 34, height: 34, borderRadius: 17, border: "none",
              background: T.bg, cursor: "pointer", fontSize: 18, color: T.text2,
              display: "flex", alignItems: "center", justifyContent: "center",
            }}>‹</button>
            <span onClick={() => { setViewDate(new Date()); onSelectDate(todayStr()); }}
              style={{ fontSize: 17, fontWeight: 700, color: T.text, cursor: "pointer" }}>
              {year}年{month + 1}月
            </span>
            <button onClick={() => setViewDate(new Date(year, month + 1, 1))} style={{
              width: 34, height: 34, borderRadius: 17, border: "none",
              background: T.bg, cursor: "pointer", fontSize: 18, color: T.text2,
              display: "flex", alignItems: "center", justifyContent: "center",
            }}>›</button>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2, marginBottom: 4 }}>
            {["一","二","三","四","五","六","日"].map(w => (
              <div key={w} style={{ textAlign: "center", fontSize: 11, fontWeight: 600, color: T.text4, padding: "4px 0" }}>{w}</div>
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2 }}>
            {cells.map((c, i) => {
              const sel = c.dateStr === selectedDate;
              const has = c.logs?.length > 0;
              const bodyLog = c.logs?.find(l => l.body?.weight);
              return (
                <div key={i} onClick={() => c.dateStr && onSelectDate(c.dateStr)} style={{
                  aspectRatio: "1", borderRadius: 12,
                  display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                  cursor: c.outside ? "default" : "pointer",
                  background: sel ? T.accent : c.today ? T.accentLight : "transparent",
                  transition: "all 0.2s", position: "relative",
                  opacity: c.outside ? 0.25 : 1,
                }}>
                  <span style={{
                    fontSize: 13, fontWeight: c.today || sel ? 700 : 400,
                    color: sel ? "#fff" : c.today ? T.accent : T.text,
                  }}>{c.day}</span>
                  {bodyLog && (
                    <span style={{
                      fontSize: 7, fontWeight: 600, position: "absolute", top: 2,
                      color: sel ? "#fff" : T.indigo, lineHeight: 1,
                    }}>{bodyLog.body.weight}</span>
                  )}
                  {has && (
                    <div style={{ display: "flex", gap: 1, position: "absolute", bottom: 3 }}>
                      {c.logs.slice(0, 3).map((log, j) => {
                        const mg = allMuscleGroups[log.muscleGroup] || FIT_MUSCLE_GROUPS[log.muscleGroup];
                        const isC = log.trainingType === "有氧";
                        const isFit = log.trainingType === "減脂Fit";
                        return (
                          <div key={j} style={{
                            width: sel ? 7 : 6, height: sel ? 7 : 6, borderRadius: 4,
                            background: sel ? "#fff" : isC ? T.yellow : isFit ? (mg?.color || T.pink) : mg?.color || T.teal,
                          }} />
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div style={{
            display: "flex", flexWrap: "wrap", gap: 10, marginTop: 14,
            padding: "10px 4px 0", borderTop: `1px solid ${T.sepLight}`,
          }}>
            {Object.entries(allMuscleGroups).map(([name, g]) => (
              <div key={name} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <div style={{ width: 8, height: 8, borderRadius: 4, background: g.color }} />
                <span style={{ fontSize: 11, color: T.text3 }}>{g.icon} {name}</span>
              </div>
            ))}
            <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <div style={{ width: 8, height: 8, borderRadius: 4, background: T.yellow }} />
              <span style={{ fontSize: 11, color: T.text3 }}>🏃 有氧</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <div style={{ width: 8, height: 8, borderRadius: 4, background: T.pink }} />
              <span style={{ fontSize: 11, color: T.text3 }}>🔥 減脂Fit</span>
            </div>
          </div>
        </Card>
      );
    }

    // ─── Stat Ring ───
    function StatRing({ value, max, label, sub, color, size = 72 }) {
      const r = (size - 10) / 2;
      const circ = 2 * Math.PI * r;
      const pct = Math.min(value / Math.max(max, 1), 1);
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
          <div style={{ position: "relative", width: size, height: size }}>
            <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
              <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={`${color}18`} strokeWidth={5} />
              <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={5}
                strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)}
                strokeLinecap="round" style={{ transition: "stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1)" }} />
            </svg>
            <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
              <span style={{ fontSize: 18, fontWeight: 800, color: T.text, lineHeight: 1 }}>{value}</span>
              <span style={{ fontSize: 9, color: T.text3, marginTop: 1 }}>{sub}</span>
            </div>
          </div>
          <span style={{ fontSize: 11, color: T.text3, fontWeight: 500 }}>{label}</span>
        </div>
      );
    }

    // ═══════════════════════════════════════
    //  MAIN APP
    // ═══════════════════════════════════════
    function App() {
      const [view, setView] = useState("home");
      const [logs, setLogs] = useState([]);
      const [loading, setLoading] = useState(true);
      const [custom, setCustom] = useState({
        locations: { "健身工廠": [], "單次健身房": [] },
        partners: [], cardioTypes: [], muscleGroups: {},
      });
      const [editingLog, setEditingLog] = useState(null);
      const [detailLog, setDetailLog] = useState(null);
      const [calDate, setCalDate] = useState(todayStr());

      const [date, setDate] = useState(todayStr());
      const [time, setTime] = useState(nowTimeStr());
      const [locCat, setLocCat] = useState("");
      const [locSub, setLocSub] = useState("");
      const [customLoc, setCustomLoc] = useState("");
      const [partner, setPartner] = useState("");
      const [customPartner, setCustomPartner] = useState("");
      const [trainType, setTrainType] = useState("");
      const [muscleGroup, setMuscleGroup] = useState("臀腿");
      const [exerciseData, setExerciseData] = useState({});
      const [cardioType, setCardioType] = useState("");
      const [customCardio, setCustomCardio] = useState("");
      const [cardioDuration, setCardioDuration] = useState("");
      const [cardioCalories, setCardioCalories] = useState("");
      const [notes, setNotes] = useState("");
      // Body stats
      const [bodyWeight, setBodyWeight] = useState("");
      const [bodyFat, setBodyFat] = useState("");
      const [muscleMass, setMuscleMass] = useState("");
      // Trend chart
      const [trendFrom, setTrendFrom] = useState(() => {
        const d = new Date(); d.setMonth(d.getMonth() - 1);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      });
      const [trendTo, setTrendTo] = useState(todayStr());
      const [showAddGroup, setShowAddGroup] = useState(false);
      const [newGroupName, setNewGroupName] = useState("");
      const [newGroupIcon, setNewGroupIcon] = useState("⭐");
      const [newGroupExercises, setNewGroupExercises] = useState("");
      const [saving, setSaving] = useState(false);
      const [exerciseOrder, setExerciseOrder] = useState({});
      const [checkedExercises, setCheckedExercises] = useState({}); // { "槓鈴深蹲": true, ... }

      // ─── Load data from Firebase ───
      useEffect(() => {
        (async () => {
          try {
            const [logsData, customData] = await Promise.all([
              window.DB.getLogs(),
              window.DB.getCustom(),
            ]);
            setLogs(logsData || []);
            if (customData) {
              setCustom(customData);
            }
          } catch (err) {
            console.error("Firebase load error:", err);
          }
          setLoading(false);
        })();
      }, []);

      const customColors = [T.teal, T.pink, T.indigo, T.orange];
      const customLights = [T.tealLight, T.pinkLight, T.indigoLight, T.orangeLight];

      const allMuscleGroups = useMemo(() => {
        const m = { ...MUSCLE_GROUPS };
        Object.entries(custom.muscleGroups || {}).forEach(([name, g], i) => {
          m[name] = {
            color: customColors[i % customColors.length],
            light: customLights[i % customLights.length],
            icon: g.icon || "⭐",
            exercises: (g.exercises || []).map(e => ({ name: e, icon: "🔹" })),
          };
        });
        return m;
      }, [custom]);

      // Switch muscle group set based on training type
      const currentGroups = trainType === "減脂Fit" ? FIT_MUSCLE_GROUPS : allMuscleGroups;

      // Auto-set first muscle group when switching training type
      useEffect(() => {
        const groups = trainType === "減脂Fit" ? FIT_MUSCLE_GROUPS : allMuscleGroups;
        const keys = Object.keys(groups);
        if (keys.length > 0 && !groups[muscleGroup]) {
          setMuscleGroup(keys[0]);
        }
      }, [trainType]);

      const allLocations = (cat) => [...(LOCATIONS[cat] || []), ...(custom.locations?.[cat] || [])];
      const allPartners = [...PARTNERS, ...(custom.partners || [])];
      const allCardioTypes = [...CARDIO_TYPES, ...(custom.cardioTypes || [])];

      // Exercise order: session-only (resets to defaults each new workout)
      // Session exercise order: reflects current drag/delete/add state
      const getOrderedExercises = (groupName) => {
        const defaults = currentGroups[groupName]?.exercises || [];
        const session = exerciseOrder[groupName];
        if (!session) return defaults;
        return session;
      };

      const updateSessionOrder = (groupName, newOrder) => {
        setExerciseOrder(prev => ({ ...prev, [groupName]: newOrder }));
      };

      useEffect(() => {
        if (muscleGroup && currentGroups[muscleGroup] && !exerciseOrder[muscleGroup]) {
          setExerciseOrder(prev => ({ ...prev, [muscleGroup]: [...(currentGroups[muscleGroup].exercises || [])] }));
        }
      }, [muscleGroup, currentGroups]);

      const addCustom = async (type, val) => {
        if (!val.trim()) return;
        const c = JSON.parse(JSON.stringify(custom));
        if (type.startsWith("loc:")) {
          const cat = type.split(":")[1];
          if (!c.locations[cat]) c.locations[cat] = [];
          if (!c.locations[cat].includes(val)) c.locations[cat].push(val);
        } else if (type === "partner") {
          if (!c.partners.includes(val)) c.partners.push(val);
        } else if (type === "cardio") {
          if (!c.cardioTypes.includes(val)) c.cardioTypes.push(val);
        }
        setCustom(c);
        await window.DB.saveCustom(c);
      };

      const addMuscleGroup = async () => {
        if (!newGroupName.trim()) return;
        const c = JSON.parse(JSON.stringify(custom));
        if (!c.muscleGroups) c.muscleGroups = {};
        c.muscleGroups[newGroupName] = {
          icon: newGroupIcon,
          exercises: newGroupExercises.split(/[,，、\n]/).map(s => s.trim()).filter(Boolean),
        };
        setCustom(c);
        await window.DB.saveCustom(c);
        setNewGroupName(""); setNewGroupIcon("⭐"); setNewGroupExercises(""); setShowAddGroup(false);
      };

      const resetForm = () => {
        setDate(todayStr());
        setTime(nowTimeStr());
        setLocCat(""); setLocSub(""); setPartner(""); setTrainType("");
        setMuscleGroup("臀腿"); setExerciseData({});
        setExerciseOrder({});
        setCheckedExercises({});
        setCardioType(""); setCardioDuration(""); setCardioCalories("");
        setNotes(""); setCustomLoc(""); setCustomPartner(""); setCustomCardio(""); setEditingLog(null);
        setBodyWeight(""); setBodyFat(""); setMuscleMass("");
      };

      const saveWorkout = async () => {
        setSaving(true);
        try {
          const loc = locSub === "__custom" ? customLoc : `${locCat} · ${locSub}`;
          const p = partner === "__custom" ? customPartner : partner;

          const isWeightType = trainType === "重訓" || trainType === "減脂Fit";

          // Save only checked exercises
          const allExercises = {};
          if (isWeightType) {
            const displayedList = getOrderedExercises(muscleGroup);
            displayedList.forEach(ex => {
              if (!checkedExercises[ex.name]) return;
              const data = exerciseData[ex.name];
              allExercises[ex.name] = (data && data.sets?.length > 0)
                ? data
                : { sets: [{ weight: "", reps: "" }], unit: "kg" };
            });
          }
          const logData = {
            date, time, location: loc, partner: p,
            trainingType: trainType,
            muscleGroup: isWeightType ? muscleGroup : null,
            exercises: isWeightType ? allExercises : null,
            cardio: trainType === "有氧" ? { type: cardioType === "__custom" ? customCardio : cardioType, duration: cardioDuration, calories: cardioCalories } : null,
            body: (bodyWeight || bodyFat || muscleMass) ? { weight: bodyWeight, fat: bodyFat, muscle: muscleMass } : null,
            notes,
          };

          if (editingLog) {
            await window.DB.updateLog(editingLog._id, logData);
            setLogs(logs.map(l => l._id === editingLog._id ? { _id: editingLog._id, ...logData } : l));
          } else {
            const newLog = await window.DB.addLog(logData);
            setLogs([newLog, ...logs]);
          }
          resetForm(); setView("home");
        } catch (err) {
          alert("儲存失敗: " + err.message);
        }
        setSaving(false);
      };

      const deleteLog = async (id) => {
        try {
          await window.DB.deleteLog(id);
          const n = logs.filter(l => l._id !== id);
          setLogs(n);
          if (detailLog?._id === id) { setDetailLog(null); setView("history"); }
        } catch (err) { alert("刪除失敗: " + err.message); }
      };

      const syncCal = (log) => {
        const t = `🏋️ ${log.trainingType}${log.muscleGroup ? ` - ${log.muscleGroup}` : ""}`;
        const s = `${log.date.replace(/-/g, "")}T${log.time.replace(":", "")}00`;
        let d = `地點：${log.location}\n夥伴：${log.partner}`;
        if (log.body) d += `\n體重：${log.body.weight || "-"}kg 體脂：${log.body.fat || "-"}% 肌肉量：${log.body.muscle || "-"}kg`;
        window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t)}&dates=${s}/${s}&details=${encodeURIComponent(d)}&location=${encodeURIComponent(log.location || "")}`, "_blank");
      };

      const startEdit = (log) => {
        setEditingLog(log); setDate(log.date); setTime(log.time);
        const lp = (log.location || "").split(" · ");
        if (lp.length === 2) { setLocCat(lp[0]); setLocSub(lp[1]); }
        setPartner(log.partner || ""); setTrainType(log.trainingType);
        if (log.muscleGroup) setMuscleGroup(log.muscleGroup);
        if (log.exercises) setExerciseData(log.exercises);
        if (log.cardio) { setCardioType(log.cardio.type); setCardioDuration(log.cardio.duration); setCardioCalories(log.cardio.calories); }
        if (log.body) { setBodyWeight(log.body.weight || ""); setBodyFat(log.body.fat || ""); setMuscleMass(log.body.muscle || ""); }
        setNotes(log.notes || ""); setView("new");
      };

      const todayTW = todayStr();
      const thisMonthTW = todayTW.slice(0, 7);
      const weekMonday = weekMondayStr();

      const weekLogs = logs.filter(l => l.date >= weekMonday && l.date <= todayTW);
      const monthLogs = logs.filter(l => l.date && l.date.startsWith(thisMonthTW));
      const totalVol = logs.reduce((s, l) => {
        if (!l.exercises) return s;
        return s + Object.values(l.exercises).reduce((ss, ex) =>
          ss + (ex.sets || []).reduce((sss, set) => {
            const w = parseFloat(set.weight) || 0;
            const r = parseInt(set.reps) || 0;
            return sss + (ex.unit === "lb" ? w * 0.453592 : w) * r;
          }, 0), 0);
      }, 0);

      const calDateLogs = logs.filter(l => l.date === calDate);
      const chipRow = { display: "flex", flexWrap: "wrap", gap: 6 };

      const navItems = [
        { id: "home", icon: "🏠", label: "首頁" },
        { id: "new", icon: "✏️", label: "紀錄" },
        { id: "history", icon: "📅", label: "日曆" },
        { id: "trend", icon: "📊", label: "趨勢" },
      ];

      const LogRow = ({ log }) => {
        const mg = allMuscleGroups[log.muscleGroup] || FIT_MUSCLE_GROUPS[log.muscleGroup];
        const isCardio = log.trainingType === "有氧";
        return (
          <Card onClick={() => { setDetailLog(log); setView("detail"); }} style={{ padding: "14px 16px", marginBottom: 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{
                width: 44, height: 44, borderRadius: 14,
                background: isCardio ? T.yellowLight : (mg?.light || T.tealLight),
                display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0,
              }}>{isCardio ? "🏃" : (mg?.icon || "🏋️")}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 15, fontWeight: 600 }}>{log.trainingType}</span>
                  {log.muscleGroup && (
                    <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 6, background: mg?.light || T.tealLight, color: mg?.color || T.teal, fontWeight: 600 }}>{log.muscleGroup}</span>
                  )}
                  {log.cardio?.type && (
                    <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 6, background: T.yellowLight, color: T.orange, fontWeight: 600 }}>{log.cardio.type}</span>
                  )}
                  {log.body?.weight && (
                    <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 6, background: T.indigoLight, color: T.indigo, fontWeight: 600 }}>⚖️ {log.body.weight}kg</span>
                  )}
                </div>
                <div style={{ fontSize: 12, color: T.text3, marginTop: 3 }}>
                  {log.date} · {log.location} · {log.partner}
                </div>
              </div>
              <span style={{ color: T.text4, fontSize: 18 }}>›</span>
            </div>
          </Card>
        );
      };

      // ─── Loading Screen ───
      useEffect(() => {
        if (!loading) {
          const s = document.getElementById("splash");
          if (s) { s.classList.add("hide"); setTimeout(() => s.remove(), 500); }
        }
      }, [loading]);

      if (loading) return null;

      return (
        <div style={{ maxWidth: 430, margin: "0 auto", minHeight: "100vh", background: T.bg, fontFamily: T.font, color: T.text }}>
          <div style={{ paddingBottom: 72 }}>

            {/* ═══ HOME ═══ */}
            {view === "home" && (
              <div style={{ padding: "0 16px 16px" }}>
                <div style={{
                  margin: "0 -16px", padding: "44px 20px 28px",
                  background: `linear-gradient(135deg, ${T.accent}, #c097cf, #c27ba0)`,
                  borderRadius: "0 0 28px 28px", marginBottom: 20, position: "relative", overflow: "hidden",
                }}>
                  <div style={{ position: "absolute", top: -30, right: -20, width: 120, height: 120, borderRadius: 60, background: "rgba(255,255,255,0.12)" }} />
                  <div style={{ position: "absolute", bottom: -20, left: 30, width: 80, height: 80, borderRadius: 40, background: "rgba(255,255,255,0.08)" }} />
                  <div style={{ position: "relative" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                      <div>
                        <h1 style={{ fontSize: 24, fontWeight: 800, color: "#fff", margin: 0 }}>Summer's Gym</h1>
                        <p style={{ color: "rgba(255,255,255,0.85)", fontSize: 13, margin: "4px 0 0" }}>
                          {new Date().toLocaleDateString("zh-TW", { month: "long", day: "numeric", weekday: "long" })}
                        </p>
                      </div>
                    </div>
                  </div>
                </div>

                <Card style={{ marginBottom: 16, padding: "20px 10px" }}>
                  <div style={{ display: "flex", justifyContent: "space-around" }}>
                    <StatRing value={weekLogs.length} max={7} label="本週訓練" sub="次" color={T.accent} />
                    <StatRing value={monthLogs.length} max={30} label="本月訓練" sub="次" color={T.blue} />
                    <StatRing value={logs.length} max={Math.max(logs.length, 30)} label="總紀錄" sub="筆" color={T.green} />
                  </div>
                </Card>

                <button onClick={() => { resetForm(); setView("new"); }} style={{
                  width: "100%", padding: "16px", borderRadius: T.radius,
                  border: "none", cursor: "pointer", fontFamily: T.font,
                  background: `linear-gradient(135deg, ${T.accent}, #c097cf)`,
                  color: "#fff", fontSize: 16, fontWeight: 700,
                  boxShadow: `0 6px 24px ${T.accent}50`, marginBottom: 20,
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
                }}>
                  <span style={{ fontSize: 20 }}>💪</span> 開始今日訓練
                </button>

                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <span style={{ fontSize: 17, fontWeight: 700 }}>最近紀錄</span>
                  {logs.length > 3 && (
                    <button onClick={() => setView("history")} style={{ background: "none", border: "none", color: T.accent, fontSize: 13, cursor: "pointer", fontFamily: T.font, fontWeight: 500 }}>全部 →</button>

                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>

            {/* ═══ TREND ═══ */}
            {view === "trend" && (() => {
              const bodyLogs = logs
                .filter(l => l.body && (l.body.weight || l.body.fat || l.body.muscle) && l.date >= trendFrom && l.date <= trendTo)
                .sort((a, b) => a.date.localeCompare(b.date));

              const chartW = 380, chartH = 180, padL = 40, padR = 16, padT = 16, padB = 28;
              const innerW = chartW - padL - padR, innerH = chartH - padT - padB;

              const drawLine = (data, color) => {
                if (data.length < 2) return null;
                const vals = data.map(d => d.v);
                const min = Math.min(...vals), max = Math.max(...vals);
                const range = max - min || 1;
                const points = data.map((d, i) => {
                  const x = padL + (i / (data.length - 1)) * innerW;
                  const y = padT + innerH - ((d.v - min) / range) * innerH;
                  return `${x},${y}`;
                });
                return { path: `M${points.join("L")}`, dots: data.map((d, i) => ({
                  x: padL + (i / (data.length - 1)) * innerW,
                  y: padT + innerH - ((d.v - min) / range) * innerH,
                  label: d.v, date: d.date,
                })), min, max };
              };

              const weightData = bodyLogs.filter(l => l.body.weight).map(l => ({ date: l.date, v: parseFloat(l.body.weight) }));
              const fatData = bodyLogs.filter(l => l.body.fat).map(l => ({ date: l.date, v: parseFloat(l.body.fat) }));
              const muscleData = bodyLogs.filter(l => l.body.muscle).map(l => ({ date: l.date, v: parseFloat(l.body.muscle) }));

              const wLine = drawLine(weightData, T.indigo);
              const fLine = drawLine(fatData, T.orange);
              const mLine = drawLine(muscleData, T.green);

              const renderChart = (title, emoji, line, color, unit) => {
                if (!line) return (
                  <Card style={{ marginBottom: 12, padding: 20, textAlign: "center" }}>
                    <div style={{ color: T.text4, fontSize: 13 }}>{emoji} {title}：資料不足（需至少 2 筆）</div>
                  </Card>
                );
                return (
                  <Card style={{ marginBottom: 12, padding: "14px 8px" }}>
                    <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8, paddingLeft: 8 }}>{emoji} {title}</div>
                    <svg viewBox={`0 0 ${chartW} ${chartH}`} style={{ width: "100%", height: "auto" }}>
                      {/* Y axis labels */}
                      <text x={padL - 4} y={padT + 4} textAnchor="end" style={{ fontSize: 9, fill: T.text4 }}>{line.max.toFixed(1)}</text>
                      <text x={padL - 4} y={padT + innerH + 4} textAnchor="end" style={{ fontSize: 9, fill: T.text4 }}>{line.min.toFixed(1)}</text>
                      {/* Grid lines */}
                      <line x1={padL} y1={padT} x2={padL + innerW} y2={padT} stroke={T.sep} strokeWidth={0.5} />
                      <line x1={padL} y1={padT + innerH} x2={padL + innerW} y2={padT + innerH} stroke={T.sep} strokeWidth={0.5} />
                      <line x1={padL} y1={padT + innerH/2} x2={padL + innerW} y2={padT + innerH/2} stroke={T.sep} strokeWidth={0.5} strokeDasharray="4" />
                      {/* Line */}
                      <path d={line.path} fill="none" stroke={color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round" />
                      {/* Dots + labels */}
                      {line.dots.map((d, i) => (
                        <g key={i}>
                          <circle cx={d.x} cy={d.y} r={3.5} fill={color} />
                          <circle cx={d.x} cy={d.y} r={6} fill={color} opacity={0.15} />
                          {(i === 0 || i === line.dots.length - 1) && (
                            <text x={d.x} y={d.y - 10} textAnchor="middle" style={{ fontSize: 9, fill: color, fontWeight: 700 }}>{d.label}{unit}</text>
                          )}
                          {/* X date labels (first and last) */}
                          {(i === 0 || i === line.dots.length - 1) && (
                            <text x={d.x} y={chartH - 4} textAnchor="middle" style={{ fontSize: 8, fill: T.text4 }}>{d.date.slice(5)}</text>
                          )}
                        </g>
                      ))}
                    </svg>
                    {/* Change indicator */}
                    {line.dots.length >= 2 && (() => {
                      const first = line.dots[0].label, last = line.dots[line.dots.length - 1].label;
                      const diff = (last - first).toFixed(1);
                      const isUp = diff > 0;
                      return (
                        <div style={{ textAlign: "center", marginTop: 4, fontSize: 12, color: isUp ? T.pink : T.green, fontWeight: 600 }}>
                          {isUp ? "▲" : "▼"} {Math.abs(diff)}{unit}（{line.dots[0].date.slice(5)} → {line.dots[line.dots.length-1].date.slice(5)}）
                        </div>
                      );
                    })()}
                  </Card>
                );
              };

              return (
                <div style={{ padding: "16px" }}>
                  <h2 style={{ fontSize: 20, fontWeight: 700, margin: "0 0 16px" }}>📊 體態趨勢</h2>
                  <Card style={{ marginBottom: 16, padding: 14 }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: T.text3, marginBottom: 8 }}>選擇日期區間</div>
                    <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                      <Input type="date" value={trendFrom} onChange={e => setTrendFrom(e.target.value)} style={{ flex: 1 }} />
                      <span style={{ color: T.text4, fontSize: 13 }}>→</span>
                      <Input type="date" value={trendTo} onChange={e => setTrendTo(e.target.value)} style={{ flex: 1 }} />
                    </div>
                    <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
                      {[
                        { label: "近1週", days: 7 }, { label: "近1月", days: 30 },
                        { label: "近3月", days: 90 }, { label: "全部", days: 9999 },
                      ].map(p => (
                        <button key={p.label} onClick={() => {
                          const d = new Date(); d.setDate(d.getDate() - p.days);
                          setTrendFrom(p.days > 3000 ? "2020-01-01" : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`);
                          setTrendTo(todayStr());
                        }} style={{
                          flex: 1, padding: "6px", borderRadius: 8, border: `1.5px solid ${T.sep}`,
                          background: T.white, color: T.text3, fontSize: 11, fontWeight: 600,
                          cursor: "pointer", fontFamily: T.font,
                        }}>{p.label}</button>
                      ))}
                    </div>
                  </Card>

                  <div style={{ fontSize: 12, color: T.text3, marginBottom: 10 }}>
                    共 {bodyLogs.length} 筆體態紀錄
                  </div>

                  {renderChart("體重", "⚖️", wLine, T.indigo, "kg")}
                  {renderChart("體脂率", "🔥", fLine, T.orange, "%")}
                  {renderChart("肌肉量", "💪", mLine, T.green, "kg")}
                </div>
              );
            })()}

          </div>

          {/* Nav */}
          <div style={{
            position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)",
            width: "100%", maxWidth: 430,
            background: "rgba(255,255,255,0.85)", backdropFilter: "blur(20px)",
            WebkitBackdropFilter: "blur(20px)",
            borderTop: `1px solid ${T.sep}`,
            display: "flex", justifyContent: "space-around",
            padding: "6px 0 env(safe-area-inset-bottom, 14px)", zIndex: 100,
          }}>
            {navItems.map(n => (
              <button key={n.id} onClick={() => { if (n.id === "new") resetForm(); setView(n.id); }} style={{
                background: "none", border: "none",
                color: view === n.id ? T.accent : T.text4,
                display: "flex", flexDirection: "column", alignItems: "center",
                gap: 2, cursor: "pointer", fontSize: 10, fontFamily: T.font,
                padding: "4px 20px", fontWeight: view === n.id ? 600 : 400,
              }}>
                <span style={{ fontSize: 22, transform: view === n.id ? "scale(1.15)" : "scale(1)", transition: "transform 0.2s" }}>{n.icon}</span>
                {n.label}
              </button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
